on:
  pull_request:
  push:
    branches:
      - main

name: Lint
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linter
        run: pip install flake8==3.7.8
      # Critical errors only (syntax errors, undefined names) — legacy fork,
      # existing code is intentionally left untouched.
      - name: flake8 (critical)
        run: flake8 featuretools --select=E9,F63,F7,F82 --count
